[ui]
hideSidebarNav = true
# hideTopBar = true suele romper el layout en Cloud (banda oscura tapando la cabecera).
hideTopBar = false

[client]
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#00664d"
backgroundColor = "#f8f9fa"
# Fondo claro: un secondary oscuro hace que Streamlit use labels en color claro en widgets
# aunque la página sea clara (p. ej. leyenda del file_uploader ilegible).
secondaryBackgroundColor = "#ffffff"
textColor = "#262730"
font = "sans serif"
