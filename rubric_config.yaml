# Rúbrica según Anexo V — Valorador de Informes de Avance (UCCuyo)
# Escala por ítem: 0–4 (0=No evidenciado · 1=Bajo · 2=Medio · 3=Alto · 4=Muy alto)
# Ponderaciones alineadas al documento institucional (suman 100 %).

scale:
  min: 0
  max: 4

weights:
  identificacion: 5
  cronograma: 10
  objetivos: 15
  metodologia: 10
  resultados: 15
  formacion: 10
  gestion: 5
  dificultades: 5
  difusion: 5
  calidad_formal: 10
  etica_normativa: 10

thresholds:
  aprobado: 70
  aprobado_obs: 50

# Nombres oficiales (Anexo V / instructivo) para tablas, sliders y exportación
labels:
  identificacion: "Identificación general del proyecto"
  cronograma: "Cumplimiento del cronograma"
  objetivos: "Grado de cumplimiento de los objetivos"
  metodologia: "Metodología"
  resultados: "Resultados parciales"
  formacion: "Formación de recursos humanos"
  gestion: "Gestión del proyecto"
  dificultades: "Dificultades y estrategias"
  difusion: "Difusión y transferencia parcial"
  calidad_formal: "Calidad formal del informe"
  etica_normativa: "Observaciones éticas y normativas"

